<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВИЗИ ПРО - Визуализация потолков</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Главный контейнер (100dvh) -->
    <div class="single-screen-wrapper">

        <!-- Шапка с логотипом -->
        <header class="site-header">
            <div class="container header-container">
                <div class="logo-block">
                    <div class="logo">В<span class="highlight">И</span>ЗИ ПРО</div>
                    <div class="logo-tagline">лучше один раз увидеть...</div>
                </div>
                <div class="header-actions">
                    <a href="#" class="login-link">👤 Войти</a>
                </div>
            </div>
        </header>

        <!-- Основной контент -->
        <main class="main-content">
            <div class="container main-container">

                <!-- Заголовок -->
                <h1 class="main-title">
                    Покажи клиенту его потолок за 30 секунд —<br class="mobile-break"> Забирай предоплату на каждом
                    замере
                </h1>

                <!-- Визуал (Слайдер) -->
                <div class="visual-area">
                    <div class="image-comparison-slider">
                        <!-- Фон: До -->
                        <img src="./before.jpg" alt="До" class="img-background"
                            onerror="this.src='/mnt/data/IMG_3065.jpg'">
                        <!-- Передний план: После -->
                        <img src="./after.jpg" alt="После" class="img-foreground" id="foreground-img"
                            onerror="this.src='/mnt/data/IMG_3081.PNG'">

                        <!-- Ползунок -->
                        <input type="range" min="0" max="100" value="50" class="slider" id="compare-slider">
                        <div class="slider-button" id="slider-button">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="m15 18-6-6 6-6" />
                                <path d="m9 18 6-6-6-6" />
                            </svg>
                        </div>
                        <div class="slider-label label-before">После</div>
                        <div class="slider-label label-after">До</div>
                    </div>
                </div>

                <!-- Новая Подсказка под Слайдером -->
                <p class="slider-hint">Сфотографируй комнату и покажи клиенту, как может выглядеть его потолок.</p>

                <!-- CTA Блок -->
                <div class="cta-area">
                    <button class="btn btn-primary btn-large click-trial">Начать бесплатно</button>

                    <!-- Обновленное Социальное Доказательство -->
                    <div class="social-proof-enhanced">
                        <div class="avatars">
                            <div class="avatar"></div>
                            <div class="avatar"></div>
                            <div class="avatar"></div>
                            <div class="avatar"></div>
                        </div>
                        <div class="social-proof-text">
                            <span class="icon">✅</span> 214 мастеров · 47 городов · 3 200+ визуализаций за месяц
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Скрипты -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Image Comparison Slider Logic
            const slider = document.getElementById('compare-slider');
            const foregroundImg = document.getElementById('foreground-img');
            const sliderBtn = document.getElementById('slider-button');

            if (slider && foregroundImg && sliderBtn) {
                slider.addEventListener('input', (e) => {
                    const val = Math.max(0, Math.min(100, e.target.value));
                    foregroundImg.style.clipPath = `polygon(0 0, ${val}% 0, ${val}% 100%, 0 100%)`;
                    sliderBtn.style.left = `calc(${val}% - 18px)`;
                });
            }
        });
    </script>
</body>

</html>
