<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВИЗИ ПРО - Визуализация потолков</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Главный контейнер (100dvh) -->
    <div class="single-screen-wrapper">

        <!-- Шапка с логотипом -->
        <header class="site-header">
            <div class="container header-container">
                <div class="logo-block">
                    <div class="logo">В<span class="highlight">И</span>ЗИ ПРО</div>
                    <div class="logo-tagline">лучше один раз увидеть...</div>
                </div>
                <div class="header-actions">
                    <a href="#" class="login-link">👤 Войти</a>
                </div>
            </div>
        </header>

        <!-- Основной контент -->
        <main class="main-content">
            <div class="container main-container">

                <!-- Заголовок -->
                <h1 class="main-title">
                    Устал слышать «я подумаю» на замерах?
                </h1>
                <p class="sub-title">Это можно исправить!</p>

                <!-- Карусель шагов -->
                <div class="carousel-area">
                    <div class="carousel-container" id="carousel">
                        <div class="carousel-track" id="carousel-track">
                            <div class="carousel-slide">
                                <img src="./step1.jpg" alt="Шаг 1">
                                <div class="slide-caption">
                                    <span class="step-number">①</span> Сфотографируй комнату
                                </div>
                            </div>
                            <div class="carousel-slide">
                                <img src="./step2.jpg" alt="Шаг 2">
                                <div class="slide-caption">
                                    <span class="step-number">②</span> Создай визуализацию за 30 сек
                                </div>
                            </div>
                            <div class="carousel-slide">
                                <img src="./step3.jpg" alt="Шаг 3">
                                <div class="slide-caption">
                                    <span class="step-number">③</span> Покажи клиенту результат
                                </div>
                            </div>
                            <div class="carousel-slide">
                                <img src="./step4.jpg" alt="Шаг 4">
                                <div class="slide-caption">
                                    <span class="step-number">④</span> Забери предоплату
                                </div>
                            </div>
                        </div>

                        <!-- Стрелка свайпа -->
                        <div class="swipe-hint" id="swipe-hint">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M5 12h14" />
                                <path d="m12 5 7 7-7 7" />
                            </svg>
                        </div>
                    </div>

                    <!-- Точки-индикаторы -->
                    <div class="carousel-dots">
                        <button class="dot active" data-index="0"></button>
                        <button class="dot" data-index="1"></button>
                        <button class="dot" data-index="2"></button>
                        <button class="dot" data-index="3"></button>
                    </div>
                </div>

                <!-- CTA Блок -->
                <div class="cta-area">
                    <button class="btn btn-primary btn-large click-trial">Начать бесплатно</button>

                    <!-- Социальное Доказательство -->
                    <div class="social-proof-enhanced">
                        <div class="avatars">
                            <div class="avatar av1"></div>
                            <div class="avatar av2"></div>
                            <div class="avatar av3"></div>
                            <div class="avatar av4"></div>
                            <div class="avatar av5"></div>
                        </div>
                        <div class="social-proof-text">
                            <span class="icon">✅</span> 200+ мастеров · 9 200+ визуализаций за месяц
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Скрипты -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const track = document.getElementById('carousel-track');
            const dots = document.querySelectorAll('.dot');
            const swipeHint = document.getElementById('swipe-hint');
            let current = 0;
            const total = 4;
            let autoTimer;
            let touchStartX = 0;
            let touchEndX = 0;

            function goTo(index) {
                current = index;
                track.style.transform = `translateX(-${current * 25}%)`;
                dots.forEach((d, i) => d.classList.toggle('active', i === current));

                // Hide swipe hint after first interaction
                if (swipeHint && current > 0) {
                    swipeHint.style.opacity = '0';
                    swipeHint.style.pointerEvents = 'none';
                }
            }

            function next() {
                goTo((current + 1) % total);
            }

            function prev() {
                goTo((current - 1 + total) % total);
            }

            // Auto-advance every 3 seconds
            function startAuto() {
                autoTimer = setInterval(next, 3000);
            }

            function stopAuto() {
                clearInterval(autoTimer);
            }

            // Dot clicks
            dots.forEach(dot => {
                dot.addEventListener('click', () => {
                    stopAuto();
                    goTo(parseInt(dot.dataset.index));
                    startAuto();
                });
            });

            // Touch swipe support
            const carousel = document.getElementById('carousel');
            carousel.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
                stopAuto();
            }, { passive: true });

            carousel.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                const diff = touchStartX - touchEndX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0) next();
                    else prev();
                }
                startAuto();
            }, { passive: true });

            // Start
            startAuto();
        });
    </script>
</body>

</html>
